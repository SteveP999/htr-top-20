<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTR Top 20</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&family=Barlow:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --dark:    #0d0c0b;
  --dark2:   #131211;
  --dark3:   #1a1917;
  --gold:    #c8922a;
  --gold-lt: #e8b44a;
  --rust:    #b44a1c;
  --cream:   #f2ede3;
  --tan:     #b8a898;
  --muted:   #6b6058;
  --border:  rgba(200,146,42,0.18);
  --new:     #4a9eff;
  --up:      #4aef8a;
  --down:    #ef4a4a;
  --hold:    #888;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--dark);
  color: var(--cream);
  font-family: 'Barlow', sans-serif;
  font-weight: 300;
  min-height: 100vh;
}
body::after {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 999;
}

/* HEADER */
header {
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1rem 2rem;
  background: rgba(13,12,11,0.92);
  border-bottom: 1px solid var(--border);
  backdrop-filter: blur(12px);
}
.header-back {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.65rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  text-decoration: none;
  transition: color 0.2s;
}
.header-back:hover { color: var(--gold-lt); }
.header-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.2rem;
  letter-spacing: 0.2em;
  color: var(--cream);
}
.header-date {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.6rem;
  letter-spacing: 0.15em;
  color: var(--muted);
  text-align: right;
}

/* HERO */
.hero {
  text-align: center;
  padding: 4rem 2rem 2rem;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse 50% 60% at 50% 30%, rgba(180,74,28,0.07) 0%, transparent 70%);
}
.hero-eyebrow {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.6rem;
  letter-spacing: 0.4em;
  text-transform: uppercase;
  color: var(--rust);
  margin-bottom: 0.75rem;
  position: relative;
}
.hero-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(3.5rem, 10vw, 7rem);
  letter-spacing: 0.04em;
  line-height: 0.9;
  color: var(--cream);
  position: relative;
  margin-bottom: 0.5rem;
}
.hero-title span { color: var(--gold); }
.gold-rule { width: 40px; height: 1px; background: var(--gold); margin: 1.25rem auto; }
.hero-sub {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.7rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
  position: relative;
}

/* CHART */
.chart-wrap {
  max-width: 860px;
  margin: 0 auto;
  padding: 2rem 1.5rem 4rem;
}

.chart-row {
  display: grid;
  grid-template-columns: 64px 56px 1fr auto;
  gap: 0;
  align-items: center;
  border-bottom: 1px solid rgba(200,146,42,0.07);
  transition: background 0.2s;
  cursor: pointer;
  text-decoration: none;
  color: inherit;
}
.chart-row:hover { background: rgba(200,146,42,0.04); }
.chart-row:hover .row-title { color: var(--gold-lt); }

/* Position */
.row-pos {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 1.25rem 0.5rem;
  border-right: 1px solid rgba(200,146,42,0.07);
}
.pos-num {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.8rem;
  letter-spacing: 0.04em;
  line-height: 1;
  color: var(--cream);
}
.chart-row:nth-child(-n+3) .pos-num { color: var(--gold); }
.pos-weeks {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.5rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 2px;
}

/* Movement */
.row-mov {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 0.5rem;
}
.mov-badge {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 0.75rem;
  letter-spacing: 0.08em;
  padding: 0.2rem 0.4rem;
  min-width: 36px;
  text-align: center;
}
.mov-NEW  { color: var(--new);  border: 1px solid rgba(74,158,255,0.3); background: rgba(74,158,255,0.08); }
.mov-UP   { color: var(--up);   border: 1px solid rgba(74,239,138,0.3); background: rgba(74,239,138,0.06); }
.mov-DOWN { color: var(--down); border: 1px solid rgba(239,74,74,0.3);  background: rgba(239,74,74,0.06);  }
.mov-HOLD { color: var(--hold); border: 1px solid rgba(136,136,136,0.2);background: rgba(136,136,136,0.04);}

/* Info */
.row-info {
  display: grid;
  grid-template-columns: 52px 1fr;
  gap: 1rem;
  align-items: center;
  padding: 1rem;
}
.row-cover {
  width: 52px;
  height: 52px;
  object-fit: cover;
  border: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--dark3);
}
.row-text {}
.row-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.1rem;
  letter-spacing: 0.06em;
  color: var(--cream);
  line-height: 1;
  margin-bottom: 0.2rem;
  transition: color 0.2s;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.row-artist {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.65rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--rust);
  margin-bottom: 0.15rem;
}
.row-album {
  font-size: 0.72rem;
  color: var(--muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* Play */
.row-play {
  padding: 0 1.5rem;
}
.play-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--tan);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: border-color 0.2s, color 0.2s, background 0.2s;
  font-size: 0.7rem;
  flex-shrink: 0;
}
.play-btn:hover { border-color: var(--gold); color: var(--gold-lt); background: rgba(200,146,42,0.08); }
.play-btn.playing { border-color: var(--rust); color: var(--rust); background: rgba(180,74,28,0.1); }

/* TOP 3 highlight */
.chart-row.top3 { background: rgba(200,146,42,0.025); }
.chart-row.top3 .row-pos { border-right-color: rgba(200,146,42,0.15); }

/* Mini player */
#mini-player {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 200;
  background: rgba(10,9,8,0.92);
  border-top: 1px solid var(--border);
  backdrop-filter: blur(16px);
  padding: 0.75rem 1.5rem;
  display: none;
  align-items: center;
  gap: 1rem;
}
#mini-player.visible { display: flex; }
#mini-art {
  width: 44px;
  height: 44px;
  object-fit: cover;
  border: 1px solid var(--border);
  flex-shrink: 0;
}
.mini-info { flex: 1; min-width: 0; }
.mini-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1rem;
  letter-spacing: 0.06em;
  color: var(--cream);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.mini-artist {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.6rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--rust);
}
.mini-controls { display: flex; align-items: center; gap: 0.5rem; }
.mini-btn {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.62rem;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--tan);
  padding: 0.35rem 0.75rem;
  cursor: pointer;
  transition: all 0.2s;
}
.mini-btn:hover { border-color: var(--gold); color: var(--gold-lt); }
.mini-btn.stop-btn { color: var(--muted); }
.mini-progress {
  flex: 1;
  height: 3px;
  background: rgba(200,146,42,0.12);
  cursor: pointer;
  max-width: 200px;
  position: relative;
}
.mini-fill {
  height: 100%;
  width: 0%;
  background: linear-gradient(to right, var(--rust), var(--gold));
  transition: width 0.5s linear;
}

/* Footer */
footer {
  text-align: center;
  padding: 2rem;
  border-top: 1px solid var(--border);
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.6rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
}
footer a { color: var(--muted); text-decoration: none; }
footer a:hover { color: var(--gold-lt); }

/* Loading */
.loading {
  text-align: center;
  padding: 4rem;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 0.7rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--muted);
}

@media (max-width: 600px) {
  .chart-row { grid-template-columns: 52px 44px 1fr auto; }
  .row-info { grid-template-columns: 44px 1fr; gap: 0.75rem; padding: 0.75rem; }
  .row-cover { width: 44px; height: 44px; }
  .row-play { padding: 0 0.75rem; }
  .pos-num { font-size: 1.4rem; }
}
</style>
</head>
<body>

<header>
  <a href="https://hellotexasrecords.com" class="header-back">← HTR Home</a>
  <div class="header-title">HTR Top 20</div>
  <div class="header-date" id="header-date"></div>
</header>

<div class="hero">
  <div class="hero-eyebrow">Hello Texas Records</div>
  <h1 class="hero-title">HTR <span>Top</span> 20</h1>
  <div class="gold-rule"></div>
  <div class="hero-sub">This Week's Chart</div>
</div>

<div class="chart-wrap" id="chart-wrap">
  <div class="loading">Loading chart...</div>
</div>

<footer>
  <a href="https://hellotexasrecords.com">Hello Texas Records</a>
  &nbsp;·&nbsp; Independent Texas Music
</footer>

<div id="mini-player">
  <img id="mini-art" src="" alt="">
  <div class="mini-info">
    <div class="mini-title" id="mini-title">—</div>
    <div class="mini-artist" id="mini-artist">HTR Radio</div>
  </div>
  <div class="mini-progress" id="mini-progress">
    <div class="mini-fill" id="mini-fill"></div>
  </div>
  <div class="mini-controls">
    <button class="mini-btn" id="mini-play-btn" onclick="togglePlay()">Pause</button>
    <button class="mini-btn stop-btn" onclick="stopAudio()">✕</button>
  </div>
</div>

<audio id="chart-audio"></audio>

<script>
const audio = document.getElementById('chart-audio');
const miniPlayer = document.getElementById('mini-player');
let currentBtn = null;

const MOV_LABEL = { NEW: '★ NEW', UP: '▲ UP', DOWN: '▼ DN', HOLD: '— HLD' };
const MOV_CLASS = { NEW: 'mov-NEW', UP: 'mov-UP', DOWN: 'mov-DOWN', HOLD: 'mov-HOLD' };

function formatDate(str) {
  if (!str) return '';
  const d = new Date(str + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
}

fetch('chart.json?cb=' + Date.now())
  .then(r => r.json())
  .then(chart => {
    const wrap = document.getElementById('chart-wrap');
    if (!chart || !chart.length) {
      wrap.innerHTML = '<div class="loading">No chart data yet.</div>';
      return;
    }

    // Date from first entry
    const chartDate = chart[0]?.chartDate || '';
    document.getElementById('header-date').innerHTML =
      `Week of<br>${formatDate(chartDate)}`;

    wrap.innerHTML = chart.map((entry, i) => {
      const movClass = MOV_CLASS[entry.movement] || 'mov-HOLD';
      const movLabel = MOV_LABEL[entry.movement] || '— HLD';
      const isTop3  = i < 3 ? 'top3' : '';
      const wkLabel = entry.weeksOnChart === 1 ? '1 week' : `${entry.weeksOnChart} wks`;

      return `
        <a class="chart-row ${isTop3}" href="${entry.siteUrl || '#'}" target="_blank"
           onclick="handleRowClick(event, ${i})">
          <div class="row-pos">
            <div class="pos-num">${entry.position}</div>
            <div class="pos-weeks">${wkLabel}</div>
          </div>
          <div class="row-mov">
            <div class="mov-badge ${movClass}">${movLabel}</div>
          </div>
          <div class="row-info">
            <img class="row-cover" src="${entry.coverImage || ''}"
                 onerror="this.src='https://raw.githubusercontent.com/SteveP999/hello-texas-records/main/htr-logo.png'"
                 alt="${entry.title}">
            <div class="row-text">
              <div class="row-title">${entry.title}</div>
              <div class="row-artist">${entry.artist}</div>
              <div class="row-album">${entry.album || ''}</div>
            </div>
          </div>
          <div class="row-play">
            ${entry.audioFile
              ? `<button class="play-btn" id="play-${i}" onclick="playEntry(event, ${i})" title="Play">▶</button>`
              : `<div class="play-btn" style="opacity:0.2;cursor:default" title="No audio">▶</div>`
            }
          </div>
        </a>
      `;
    }).join('');

    // Store chart for playback
    window._chart = chart;
  })
  .catch(() => {
    document.getElementById('chart-wrap').innerHTML =
      '<div class="loading">Could not load chart. Check back soon.</div>';
  });

function handleRowClick(e, index) {
  // If clicking play button, don't navigate
  if (e.target.closest('.play-btn')) { e.preventDefault(); return; }
}

function playEntry(e, index) {
  e.preventDefault();
  e.stopPropagation();
  const entry = window._chart[index];
  if (!entry || !entry.audioFile) return;

  // If already playing this track, toggle pause
  if (currentBtn && currentBtn.id === `play-${index}`) {
    if (audio.paused) {
      audio.play();
      currentBtn.textContent = '❚❚';
      currentBtn.classList.add('playing');
      document.getElementById('mini-play-btn').textContent = 'Pause';
    } else {
      audio.pause();
      currentBtn.textContent = '▶';
      currentBtn.classList.remove('playing');
      document.getElementById('mini-play-btn').textContent = 'Play';
    }
    return;
  }

  // Stop previous
  if (currentBtn) {
    currentBtn.textContent = '▶';
    currentBtn.classList.remove('playing');
  }

  // Play new
  audio.src = entry.audioFile;
  audio.play().catch(() => {});
  currentBtn = document.getElementById(`play-${index}`);
  currentBtn.textContent = '❚❚';
  currentBtn.classList.add('playing');

  // Update mini player
  document.getElementById('mini-title').textContent  = entry.title;
  document.getElementById('mini-artist').textContent = entry.artist;
  const art = document.getElementById('mini-art');
  art.src = entry.coverImage || 'https://raw.githubusercontent.com/SteveP999/hello-texas-records/main/htr-logo.png';
  miniPlayer.classList.add('visible');
  document.getElementById('mini-play-btn').textContent = 'Pause';
}

function togglePlay() {
  if (audio.paused) {
    audio.play();
    if (currentBtn) { currentBtn.textContent = '❚❚'; currentBtn.classList.add('playing'); }
    document.getElementById('mini-play-btn').textContent = 'Pause';
  } else {
    audio.pause();
    if (currentBtn) { currentBtn.textContent = '▶'; currentBtn.classList.remove('playing'); }
    document.getElementById('mini-play-btn').textContent = 'Play';
  }
}

function stopAudio() {
  audio.pause();
  audio.src = '';
  if (currentBtn) { currentBtn.textContent = '▶'; currentBtn.classList.remove('playing'); currentBtn = null; }
  miniPlayer.classList.remove('visible');
}

audio.addEventListener('ended', () => {
  if (currentBtn) { currentBtn.textContent = '▶'; currentBtn.classList.remove('playing'); currentBtn = null; }
  miniPlayer.classList.remove('visible');
});

audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  document.getElementById('mini-fill').style.width = pct + '%';
});

document.getElementById('mini-progress').addEventListener('click', e => {
  if (!audio.duration) return;
  const rect = e.currentTarget.getBoundingClientRect();
  audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
});
</script>
</body>
</html>
