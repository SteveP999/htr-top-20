<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>HTR Top 20 - July 2026</title><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&family=Barlow:wght@300;400&display=swap" rel="stylesheet"><style>:root{--dark:#0d0c0b;--dark2:#131211;--dark3:#1a1917;--gold:#c8922a;--gold-lt:#e8b44a;--rust:#b44a1c;--cream:#f2ede3;--tan:#b8a898;--muted:#6b6058;--border:rgba(200,146,42,0.18);--new:#4a9eff;--up:#4aef8a;--down:#ef4a4a;--hold:#888;}*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}body{background:var(--dark);color:var(--cream);font-family:'Barlow',sans-serif;font-weight:300;min-height:100vh;padding-bottom:40px;}header{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:.85rem 2rem;background:rgba(13,12,11,0.94);border-bottom:1px solid var(--border);backdrop-filter:blur(12px);}.hdr-back{font-family:'Barlow Condensed',sans-serif;font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);text-decoration:none;}.hdr-back:hover{color:var(--gold-lt);}.hdr-title{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:.2em;}.hdr-date{font-family:'Barlow Condensed',sans-serif;font-size:.58rem;letter-spacing:.12em;color:var(--muted);}.hero{text-align:center;padding:2rem 2rem 1rem;}.hero-logo{height:140px;width:auto;margin-bottom:.5rem;opacity:.9;}.hero-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(1.5rem,4.5vw,3rem);letter-spacing:.04em;line-height:.9;margin-bottom:.5rem;}.hero-title span{color:var(--gold);}.gold-rule{width:36px;height:1px;background:var(--gold);margin:.75rem auto;}.hero-sub{font-family:'Barlow Condensed',sans-serif;font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);}.yt-wrap{max-width:900px;margin:0 auto 1.5rem;padding:0 1rem;}.yt-frame-wrap{position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border:1px solid var(--border);background:#000;}.yt-frame-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;}.yt-controls{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem;padding:.75rem 0;}.yt-status{font-family:'Barlow Condensed',sans-serif;font-size:.7rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);}.yt-status span{color:var(--gold-lt);}.yt-btns{display:flex;gap:.5rem;}.yt-btn{font-family:'Barlow Condensed',sans-serif;font-size:.65rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;border:1px solid var(--border);background:transparent;color:var(--tan);padding:.4rem 1rem;cursor:pointer;transition:all .2s;}.yt-btn:hover{border-color:var(--gold);color:var(--gold-lt);}.yt-btn.primary{background:var(--rust);border-color:var(--rust);color:#fff;}.yt-btn.primary:hover{background:#d05520;}.yt-btn:disabled{opacity:.3;cursor:default;pointer-events:none;}.chart-wrap{max-width:900px;margin:0 auto;padding:0 1rem 2rem;}.chart-header{font-family:'Barlow Condensed',sans-serif;font-size:.6rem;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);padding:.5rem 0 .75rem;border-bottom:1px solid var(--border);margin-bottom:.25rem;}.chart-row{display:grid;grid-template-columns:60px 52px 1fr;align-items:center;border-bottom:1px solid rgba(200,146,42,.06);transition:background .25s;cursor:pointer;overflow:hidden;}.chart-row:hover{background:rgba(200,146,42,.04);}.chart-row.active-row{background:rgba(200,146,42,0.07);border-left:3px solid var(--rust);}.chart-row.active-row .pos-num{color:var(--gold);}.row-pos{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1rem .5rem;border-right:1px solid rgba(200,146,42,.06);}.pos-num{font-family:'Bebas Neue',sans-serif;font-size:1.7rem;letter-spacing:.04em;line-height:1;color:var(--cream);}.pos-weeks{font-family:'Barlow Condensed',sans-serif;font-size:.48rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-top:2px;}.row-mov{display:flex;align-items:center;justify-content:center;padding:0 .4rem;}.mov-badge{font-family:'Bebas Neue',sans-serif;font-size:.7rem;padding:.15rem .35rem;min-width:34px;text-align:center;}.mov-NEW{color:var(--new);border:1px solid rgba(74,158,255,.3);background:rgba(74,158,255,.08);}.mov-UP{color:var(--up);border:1px solid rgba(74,239,138,.3);background:rgba(74,239,138,.06);}.mov-DOWN{color:var(--down);border:1px solid rgba(239,74,74,.3);background:rgba(239,74,74,.06);}.mov-HOLD{color:var(--hold);border:1px solid rgba(136,136,136,.2);background:rgba(136,136,136,.04);}.row-info{display:flex;align-items:center;gap:1rem;padding:.85rem 1rem;}.row-cover{width:48px;height:48px;object-fit:cover;border:1px solid var(--border);background:var(--dark3);flex-shrink:0;transition:width .3s,height .3s;}.chart-row.active-row .row-cover{width:80px;height:80px;}.row-text{min-width:0;flex:1;}.row-title{font-family:'Bebas Neue',sans-serif;font-size:1.05rem;letter-spacing:.06em;color:var(--cream);line-height:1;margin-bottom:.2rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}.row-artist{font-family:'Barlow Condensed',sans-serif;font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;color:var(--rust);margin-bottom:.12rem;}.row-album{font-size:.7rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}.row-meta{margin-top:.4rem;display:flex;align-items:center;gap:.75rem;}.now-playing-tag{font-family:'Barlow Condensed',sans-serif;font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);display:none;}.chart-row.active-row .now-playing-tag{display:block;}.skip-btn{font-family:'Barlow Condensed',sans-serif;font-size:.58rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;background:var(--rust);color:#fff;border:none;padding:.3rem .75rem;cursor:pointer;display:none;transition:background .2s;}.skip-btn:hover{background:#d05520;}.chart-row.active-row .skip-btn{display:inline-block;}@media(max-width:580px){.chart-row{grid-template-columns:48px 40px 1fr;}.pos-num{font-size:1.3rem;}.chart-row.active-row .row-cover{width:56px;height:56px;}}</style></head><body><header><a href="https://hellotexasrecords.com" class="hdr-back">&#8592; HTR Home</a><div class="hdr-title">HTR Top 20</div><div class="hdr-date">July 2026</div></header><div class="hero"><img src="https://raw.githubusercontent.com/SteveP999/hello-texas-records/main/htr-logo.png" alt="Hello Texas Records" class="hero-logo"><h1 class="hero-title">Top <span>20</span></h1><div class="gold-rule"></div><div class="hero-sub">July 2026 Countdown</div></div><div class="yt-wrap"><div class="yt-frame-wrap"><iframe id="yt-player" src="https://www.youtube.com/embed/Qs30bKkYx5M?enablejsapi=1&origin=https://htr-top-20.hellotexasrecords.com&rel=0" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div><div class="yt-controls"><div class="yt-status">Now Playing: <span id="yt-now">Introduction</span></div><div class="yt-btns"><button class="yt-btn" id="btn-prev" onclick="skipToPrev()" disabled>&#9664; Prev</button><button class="yt-btn primary" id="btn-next" onclick="skipToNext()">Skip to Next &#9654;</button></div></div></div><div class="chart-wrap"><div class="chart-header">Click any song to jump to that point in the video &bull; Use Skip buttons to move through the countdown</div><div id="chart-list"></div></div><script>const YOUTUBE_URL="https://www.youtube.com/watch?v=Qs30bKkYx5M";let chart=[],displayOrder=[],currentIdx=-1,ytPlayer=null,pollTimer=null;const MOV_LABEL={NEW:"&#9733; NEW",UP:"&#9650; UP",DOWN:"&#9660; DN",HOLD:"&mdash; HLD"};const MOV_CLASS={NEW:"mov-NEW",UP:"mov-UP",DOWN:"mov-DOWN",HOLD:"mov-HOLD"};function onYouTubeIframeAPIReady(){ytPlayer=new YT.Player("yt-player",{events:{onStateChange:onPlayerStateChange}});}function onPlayerStateChange(e){if(e.data===1)startPolling();else stopPolling();}function startPolling(){stopPolling();pollTimer=setInterval(syncChart,1000);}function stopPolling(){clearInterval(pollTimer);}function syncChart(){if(!ytPlayer||typeof ytPlayer.getCurrentTime!=="function")return;const t=ytPlayer.getCurrentTime();let active=-1;for(let i=0;i<displayOrder.length;i++){if(t>=displayOrder[i].youtubeTimestamp)active=i;}if(active!==currentIdx)setActiveRow(active);}fetch("chart.json?cb="+Date.now()).then(r=>r.json()).then(data=>{chart=data;displayOrder=[...data].sort((a,b)=>b.position-a.position);buildChart();}).catch(()=>{document.getElementById("chart-list").innerHTML="<div style='text-align:center;padding:3rem;color:var(--muted)'>Could not load chart.</div>";});function buildChart(){const list=document.getElementById("chart-list");list.innerHTML=displayOrder.map((e,di)=>{const mc=MOV_CLASS[e.movement]||"mov-HOLD";const wk=e.weeksOnChart===1?"1 wk":e.weeksOnChart+" wks";const nextEntry=di<displayOrder.length-1?displayOrder[di+1]:null;return `<div class="chart-row" id="row-${di}" onclick="jumpTo(${di})"><div class="row-pos"><div class="pos-num">${e.position}</div><div class="pos-weeks">${wk}</div></div><div class="row-mov"><div class="mov-badge ${mc}">&#9733; NEW</div></div><div class="row-info"><img class="row-cover" src="${e.coverImage||""}" onerror="this.src='https://raw.githubusercontent.com/SteveP999/hello-texas-records/main/htr-logo.png'" alt=""><div class="row-text"><div class="row-title">${e.title}</div><div class="row-artist">${e.artist}</div><div class="row-album">${e.album||""}</div><div class="row-meta"><span class="now-playing-tag">&#9654; Now Playing</span>${nextEntry?`<button class="skip-btn" onclick="event.stopPropagation();skipToNext()">Skip to #${nextEntry.position} &#9654;</button>`:""}</div></div></div></div>`;}).join("");}function setActiveRow(di){if(currentIdx>=0)document.getElementById("row-"+currentIdx)?.classList.remove("active-row");currentIdx=di;if(di<0){document.getElementById("yt-now").textContent="Introduction";document.getElementById("btn-prev").disabled=true;document.getElementById("btn-next").disabled=false;return;}const row=document.getElementById("row-"+di);if(row){row.classList.add("active-row");row.scrollIntoView({behavior:"smooth",block:"nearest"});}const e=displayOrder[di];document.getElementById("yt-now").textContent="#"+e.position+" \u2014 "+e.title+" \u2022 "+e.artist;document.getElementById("btn-prev").disabled=di<=0;document.getElementById("btn-next").disabled=di>=displayOrder.length-1;}function jumpTo(di){if(!ytPlayer||typeof ytPlayer.seekTo!=="function"){window.open(YOUTUBE_URL+"&t="+displayOrder[di].youtubeTimestamp+"s","_blank");return;}ytPlayer.seekTo(displayOrder[di].youtubeTimestamp,true);ytPlayer.playVideo();setActiveRow(di);}function skipToNext(){const n=currentIdx+1;if(n<displayOrder.length)jumpTo(n);}function skipToPrev(){const p=currentIdx-1;if(p>=0)jumpTo(p);}<\/script><script src="https://www.youtube.com/iframe_api"><\/script></body></html>
