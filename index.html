<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTR Top 20</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&family=Barlow:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{
  --dark:#0d0c0b;--dark2:#131211;--dark3:#1a1917;
  --gold:#c8922a;--gold-lt:#e8b44a;--rust:#b44a1c;
  --cream:#f2ede3;--tan:#b8a898;--muted:#6b6058;
  --border:rgba(200,146,42,0.18);
  --new:#4a9eff;--up:#4aef8a;--down:#ef4a4a;--hold:#888;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--dark);color:var(--cream);font-family:'Barlow',sans-serif;font-weight:300;min-height:100vh;padding-bottom:100px;}

/* grain */
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:999;}

header{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:.85rem 2rem;background:rgba(13,12,11,0.94);border-bottom:1px solid var(--border);backdrop-filter:blur(12px);}
.hdr-back{font-family:'Barlow Condensed',sans-serif;font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color .2s;}
.hdr-back:hover{color:var(--gold-lt);}
.hdr-title{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:.2em;}
.hdr-date{font-family:'Barlow Condensed',sans-serif;font-size:.58rem;letter-spacing:.12em;color:var(--muted);text-align:right;}

.hero{text-align:center;padding:3rem 2rem 1.5rem;position:relative;}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 50% 60% at 50% 30%,rgba(180,74,28,.07) 0%,transparent 70%);}
.hero-eyebrow{font-family:'Barlow Condensed',sans-serif;font-size:.6rem;letter-spacing:.4em;text-transform:uppercase;color:var(--rust);margin-bottom:.6rem;position:relative;}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(3rem,9vw,6rem);letter-spacing:.04em;line-height:.9;position:relative;margin-bottom:.5rem;}
.hero-title span{color:var(--gold);}
.gold-rule{width:36px;height:1px;background:var(--gold);margin:1rem auto;}
.hero-sub{font-family:'Barlow Condensed',sans-serif;font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);position:relative;}
.hero-logo{height:80px;width:auto;margin-bottom:1rem;opacity:.9;position:relative;}

/* controls bar */
.controls-bar{display:flex;align-items:center;justify-content:center;gap:1rem;padding:1.25rem 2rem;border-bottom:1px solid var(--border);}
.ctrl-btn{font-family:'Barlow Condensed',sans-serif;font-size:.7rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;border:1px solid var(--border);background:transparent;color:var(--tan);padding:.55rem 1.4rem;cursor:pointer;transition:all .2s;}
.ctrl-btn:hover{border-color:var(--gold);color:var(--gold-lt);}
.ctrl-btn.primary{background:var(--rust);border-color:var(--rust);color:var(--cream);}
.ctrl-btn.primary:hover{background:#d05520;border-color:#d05520;}
.ctrl-btn:disabled{opacity:.3;cursor:default;pointer-events:none;}

/* chart list */
.chart-wrap{max-width:900px;margin:0 auto;padding:0 1rem 2rem;}

/* each row */
.chart-row{
  display:grid;
  grid-template-columns:60px 52px 1fr;
  align-items:center;
  border-bottom:1px solid rgba(200,146,42,.06);
  transition:background .2s, opacity .4s, filter .4s;
  position:relative;
  overflow:hidden;
}

/* UNREVEALED — darkened, blurred title */
.chart-row.hidden-row{
  opacity:0.35;
  filter:blur(1px);
  pointer-events:none;
}
.chart-row.hidden-row .row-title{
  filter:blur(6px);
  user-select:none;
}
.chart-row.hidden-row .row-artist,
.chart-row.hidden-row .row-album,
.chart-row.hidden-row .row-cover{
  filter:blur(4px);
}

/* ACTIVE — currently playing */
.chart-row.active-row{
  opacity:1;
  filter:none;
  background:rgba(200,146,42,0.05);
  border-left:2px solid var(--rust);
}

/* REVEALED — already played */
.chart-row.revealed-row{
  opacity:0.75;
  filter:none;
}
.chart-row.revealed-row:hover{opacity:1;background:rgba(200,146,42,.04);}

/* position column */
.row-pos{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1rem .5rem;border-right:1px solid rgba(200,146,42,.06);}
.pos-num{font-family:'Bebas Neue',sans-serif;font-size:1.7rem;letter-spacing:.04em;line-height:1;color:var(--cream);}
.chart-row.active-row .pos-num{color:var(--gold);}
.pos-weeks{font-family:'Barlow Condensed',sans-serif;font-size:.48rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-top:2px;}

/* movement */
.row-mov{display:flex;align-items:center;justify-content:center;padding:0 .4rem;}
.mov-badge{font-family:'Bebas Neue',sans-serif;font-size:.7rem;padding:.15rem .35rem;min-width:34px;text-align:center;}
.mov-NEW{color:var(--new);border:1px solid rgba(74,158,255,.3);background:rgba(74,158,255,.08);}
.mov-UP{color:var(--up);border:1px solid rgba(74,239,138,.3);background:rgba(74,239,138,.06);}
.mov-DOWN{color:var(--down);border:1px solid rgba(239,74,74,.3);background:rgba(239,74,74,.06);}
.mov-HOLD{color:var(--hold);border:1px solid rgba(136,136,136,.2);background:rgba(136,136,136,.04);}

/* info */
.row-info{display:flex;align-items:center;gap:1rem;padding:.85rem 1rem;}
.row-cover{
  object-fit:cover;border:1px solid var(--border);background:var(--dark3);
  flex-shrink:0;
  width:48px;height:48px;
  transition:width .4s ease, height .4s ease;
}
.chart-row.active-row .row-cover{
  width:120px;height:120px;
}
.row-text{min-width:0;flex:1;}
.row-title{font-family:'Bebas Neue',sans-serif;font-size:1.05rem;letter-spacing:.06em;color:var(--cream);line-height:1;margin-bottom:.2rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:filter .4s;}
.row-artist{font-family:'Barlow Condensed',sans-serif;font-size:.62rem;letter-spacing:.15em;text-transform:uppercase;color:var(--rust);margin-bottom:.12rem;transition:filter .4s;}
.row-album{font-size:.7rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:filter .4s;}
.row-meta{display:flex;align-items:center;gap:.6rem;margin-top:.4rem;}

/* casey label on active row */
.casey-label{font-family:'Barlow Condensed',sans-serif;font-size:.58rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);display:none;}
.chart-row.active-row .casey-label.visible{display:block;}

/* bottom player bar */
#player-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:rgba(10,9,8,0.95);border-top:1px solid var(--border);
  backdrop-filter:blur(16px);
  padding:.65rem 1.5rem;
  display:none;align-items:center;gap:1rem;
}
#player-bar.visible{display:flex;}
#bar-art{width:40px;height:40px;object-fit:cover;border:1px solid var(--border);flex-shrink:0;}
.bar-info{flex:1;min-width:0;}
.bar-title{font-family:'Bebas Neue',sans-serif;font-size:.95rem;letter-spacing:.06em;color:var(--cream);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.bar-artist{font-family:'Barlow Condensed',sans-serif;font-size:.58rem;letter-spacing:.15em;text-transform:uppercase;color:var(--rust);}
.bar-progress{flex:1;height:3px;background:rgba(200,146,42,.12);cursor:pointer;max-width:220px;}
.bar-fill{height:100%;width:0%;background:linear-gradient(to right,var(--rust),var(--gold));transition:width .5s linear;}
.bar-controls{display:flex;align-items:center;gap:.4rem;}
.bar-btn{font-family:'Barlow Condensed',sans-serif;font-size:.6rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;border:1px solid var(--border);background:transparent;color:var(--tan);padding:.3rem .65rem;cursor:pointer;transition:all .2s;white-space:nowrap;}
.bar-btn:hover{border-color:var(--gold);color:var(--gold-lt);}
.bar-btn.next{background:var(--rust);border-color:var(--rust);color:var(--cream);}
.bar-btn.next:hover{background:#d05520;}
.bar-btn.stop{color:var(--muted);}
.bar-btn:disabled{opacity:.3;cursor:default;pointer-events:none;}

audio{display:none;}

@media(max-width:580px){
  .chart-row{grid-template-columns:48px 40px 1fr;}
  .pos-num{font-size:1.3rem;}
  .chart-row.active-row .row-cover{width:80px;height:80px;}
  .bar-progress{max-width:100px;}
}
</style>
</head>
<body>

<header>
  <a href="https://hellotexasrecords.com" class="hdr-back">← HTR Home</a>
  <div class="hdr-date" id="hdr-date"></div>
</header>

<div class="hero">
  <img src="https://raw.githubusercontent.com/SteveP999/hello-texas-records/main/htr-logo.png"
       alt="Hello Texas Records" class="hero-logo">
  <h1 class="hero-title">Top <span>20</span></h1>
  <div class="gold-rule"></div>
  <div class="hero-sub" id="hero-sub">May 2026</div>
</div>

<div class="controls-bar">
  <button class="ctrl-btn primary" id="btn-start" onclick="startCountdown()">▶ Start Countdown</button>
  <button class="ctrl-btn" id="btn-show-all" onclick="showAll()">Show All Songs</button>
</div>

<div class="chart-wrap" id="chart-wrap">
  <div style="text-align:center;padding:3rem;font-family:'Barlow Condensed',sans-serif;font-size:.7rem;letter-spacing:.25em;text-transform:uppercase;color:var(--muted);">Loading chart...</div>
</div>

<div id="player-bar">
  <img id="bar-art" src="" alt="">
  <div class="bar-info">
    <div class="bar-title" id="bar-title">—</div>
    <div class="bar-artist" id="bar-artist">HTR Top 20</div>
  </div>
  <div class="bar-progress" id="bar-progress">
    <div class="bar-fill" id="bar-fill"></div>
  </div>
  <div class="bar-controls">
    <button class="bar-btn" id="btn-play" onclick="togglePlay()">Pause</button>
    <button class="bar-btn next" id="btn-next" onclick="nextSong()" disabled>Next Song ▶</button>
    <button class="bar-btn stop" onclick="stopAll()">✕</button>
  </div>
</div>

<audio id="audio"></audio>

<script>
const audio     = document.getElementById('audio');
const playerBar = document.getElementById('player-bar');
const btnNext   = document.getElementById('btn-next');
const btnPlay   = document.getElementById('btn-play');

let chart        = [];       // original order: index 0 = position 1
let displayOrder = [];       // reversed: index 0 = position 20
let currentDIdx  = null;     // index in displayOrder currently playing
let playingIntro = false;
let nextTimer    = null;
let started      = false;
let allRevealed  = false;

const MOV_LABEL = {NEW:'★ NEW',UP:'▲ UP',DOWN:'▼ DN',HOLD:'— HLD'};
const MOV_CLASS = {NEW:'mov-NEW',UP:'mov-UP',DOWN:'mov-DOWN',HOLD:'mov-HOLD'};

function fmt(str){
  if(!str) return '';
  const d = new Date(str+'T00:00:00');
  return d.toLocaleDateString('en-US',{month:'long',year:'numeric'});
}

fetch('chart.json?cb='+Date.now())
  .then(r=>r.json())
  .then(data=>{
    chart        = data;
    displayOrder = [...data].reverse(); // pos 20 first
    buildChart();
    const d = data[0]?.chartDate||'';
    document.getElementById('hdr-date').innerHTML = d?fmt(d):'';
    document.getElementById('hero-sub').textContent = d?fmt(d):'May 2026';
  })
  .catch(()=>{
    document.getElementById('chart-wrap').innerHTML =
      '<div style="text-align:center;padding:3rem;color:#6b6058">Could not load chart.</div>';
  });

function buildChart(){
  const wrap = document.getElementById('chart-wrap');
  wrap.innerHTML = displayOrder.map((e,di)=>{
    const mc  = MOV_CLASS[e.movement]||'mov-HOLD';
    const ml  = MOV_LABEL[e.movement]||'— HLD';
    const wk  = e.weeksOnChart===1?'1 wk':`${e.weeksOnChart} wks`;
    // All rows start hidden except none (reveal one by one)
    return `
    <div class="chart-row hidden-row" id="row-${di}" data-di="${di}">
      <div class="row-pos">
        <div class="pos-num">${e.position}</div>
        <div class="pos-weeks">${wk}</div>
      </div>
      <div class="row-mov">
        <div class="mov-badge ${mc}">${ml}</div>
      </div>
      <div class="row-info">
        <img class="row-cover" id="cover-${di}"
          src="${e.coverImage||''}"
          onerror="this.src='https://raw.githubusercontent.com/SteveP999/hello-texas-records/main/htr-logo.png'"
          alt="">
        <div class="row-text">
          <div class="row-title">${e.title}</div>
          <div class="row-artist">${e.artist}</div>
          <div class="row-album">${e.album||''}</div>
          <div class="row-meta">
            <span class="casey-label" id="casey-${di}">Countdown Casey...</span>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

// ── Show All ──────────────────────────────────────────────────
function showAll(){
  allRevealed = true;
  displayOrder.forEach((_,di)=> revealRow(di));
  document.getElementById('btn-show-all').textContent = 'All Songs Visible';
  document.getElementById('btn-show-all').disabled = true;
}

function revealRow(di){
  const row = document.getElementById('row-'+di);
  if(!row) return;
  row.classList.remove('hidden-row');
  if(!row.classList.contains('active-row'))
    row.classList.add('revealed-row');
}

// ── Start Countdown ───────────────────────────────────────────
function startCountdown(){
  if(started) return;
  started = true;
  document.getElementById('btn-start').disabled = true;
  document.getElementById('btn-start').textContent = 'Playing...';
  playIndex(0); // start at position 20 (displayOrder index 0)
}

function playIndex(di){
  const entry = displayOrder[di];
  if(!entry) return;

  // Deactivate previous
  if(currentDIdx !== null){
    const prev = document.getElementById('row-'+currentDIdx);
    if(prev){
      prev.classList.remove('active-row');
      prev.classList.add('revealed-row');
      document.getElementById('casey-'+currentDIdx)?.classList.remove('visible');
    }
  }

  currentDIdx = di;
  clearTimeout(nextTimer);
  btnNext.disabled = true;

  // Reveal and activate this row
  const row = document.getElementById('row-'+di);
  if(row){
    row.classList.remove('hidden-row','revealed-row');
    row.classList.add('active-row');
    // Scroll into view
    row.scrollIntoView({behavior:'smooth',block:'center'});
  }

  // Update bottom bar
  document.getElementById('bar-title').textContent  = entry.title;
  document.getElementById('bar-artist').textContent = entry.artist;
  document.getElementById('bar-art').src = entry.coverImage ||
    'https://raw.githubusercontent.com/SteveP999/hello-texas-records/main/htr-logo.png';
  playerBar.classList.add('visible');
  btnPlay.textContent = 'Pause';

  // Play intro → song
  if(entry.introAudio){
    playingIntro = true;
    showCasey(di, true);
    audio.src = entry.introAudio;
    audio.play().catch(()=>playSong(di));
  } else {
    playSong(di);
  }
}

function playSong(di){
  playingIntro = false;
  showCasey(di, false);
  const entry = displayOrder[di];
  btnPlay.textContent = 'Pause';
  if(entry.audioFile){
    audio.src = entry.audioFile;
    audio.play().catch(()=>{});
    // Enable Next after 5 seconds
    nextTimer = setTimeout(()=>{ btnNext.disabled = false; }, 5000);
  }
}

function showCasey(di, show){
  const el = document.getElementById('casey-'+di);
  if(el) el.classList.toggle('visible', show);
}

// ── Song ended ────────────────────────────────────────────────
audio.addEventListener('ended',()=>{
  if(playingIntro && currentDIdx !== null){
    playSong(currentDIdx);
  } else {
    // Auto-advance to next
    nextSong();
  }
});

function nextSong(){
  if(currentDIdx === null) return;
  const next = currentDIdx + 1;
  if(next < displayOrder.length){
    playIndex(next);
  } else {
    // Reached the end (#1)
    btnPlay.textContent = 'Play';
    btnNext.disabled = true;
    document.getElementById('btn-start').textContent = 'Countdown Complete';
    document.getElementById('hero-sub').textContent = 'You\'ve heard them all.';
  }
}

// ── Controls ──────────────────────────────────────────────────
function togglePlay(){
  if(audio.paused){
    audio.play();
    btnPlay.textContent = 'Pause';
  } else {
    audio.pause();
    btnPlay.textContent = 'Play';
  }
}

function stopAll(){
  audio.pause(); audio.src = '';
  clearTimeout(nextTimer);
  playingIntro = false;
  btnNext.disabled = true;
  if(currentDIdx !== null){
    const row = document.getElementById('row-'+currentDIdx);
    if(row){ row.classList.remove('active-row'); row.classList.add('revealed-row'); }
    showCasey(currentDIdx, false);
  }
  currentDIdx = null;
  playerBar.classList.remove('visible');
  btnPlay.textContent = 'Pause';
  document.getElementById('btn-start').disabled = false;
  document.getElementById('btn-start').textContent = '▶ Start Countdown';
  started = false;
}

// ── Progress bar ──────────────────────────────────────────────
audio.addEventListener('timeupdate',()=>{
  if(!audio.duration) return;
  document.getElementById('bar-fill').style.width =
    (audio.currentTime/audio.duration*100)+'%';
});

document.getElementById('bar-progress').addEventListener('click',e=>{
  if(!audio.duration) return;
  const r = e.currentTarget.getBoundingClientRect();
  audio.currentTime = ((e.clientX-r.left)/r.width)*audio.duration;
});
</script>
</body>
</html>
