<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTR Top 20</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&family=Barlow:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --dark:#0d0c0b;--dark2:#131211;--dark3:#1a1917;
  --gold:#c8922a;--gold-lt:#e8b44a;--rust:#b44a1c;
  --cream:#f2ede3;--tan:#b8a898;--muted:#6b6058;
  --border:rgba(200,146,42,0.18);
  --new:#4a9eff;--up:#4aef8a;--down:#ef4a4a;--hold:#888;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--dark);color:var(--cream);font-family:'Barlow',sans-serif;font-weight:300;min-height:100vh;}
body::after{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");pointer-events:none;z-index:999;}
header{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;background:rgba(13,12,11,0.92);border-bottom:1px solid var(--border);backdrop-filter:blur(12px);}
.header-back{font-family:'Barlow Condensed',sans-serif;font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color .2s;}
.header-back:hover{color:var(--gold-lt);}
.header-title{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:.2em;color:var(--cream);}
.header-date{font-family:'Barlow Condensed',sans-serif;font-size:.6rem;letter-spacing:.15em;color:var(--muted);text-align:right;}
.hero{text-align:center;padding:4rem 2rem 2rem;position:relative;overflow:hidden;}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 50% 60% at 50% 30%,rgba(180,74,28,.07) 0%,transparent 70%);}
.hero-eyebrow{font-family:'Barlow Condensed',sans-serif;font-size:.6rem;letter-spacing:.4em;text-transform:uppercase;color:var(--rust);margin-bottom:.75rem;position:relative;}
.hero-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(3.5rem,10vw,7rem);letter-spacing:.04em;line-height:.9;color:var(--cream);position:relative;margin-bottom:.5rem;}
.hero-title span{color:var(--gold);}
.gold-rule{width:40px;height:1px;background:var(--gold);margin:1.25rem auto;}
.hero-sub{font-family:'Barlow Condensed',sans-serif;font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);position:relative;}
.chart-wrap{max-width:860px;margin:0 auto;padding:2rem 1.5rem 6rem;}
.chart-row{display:grid;grid-template-columns:64px 56px 1fr auto;align-items:center;border-bottom:1px solid rgba(200,146,42,.07);transition:background .2s;cursor:pointer;text-decoration:none;color:inherit;}
.chart-row:hover{background:rgba(200,146,42,.04);}
.chart-row:hover .row-title{color:var(--gold-lt);}
.row-pos{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.25rem .5rem;border-right:1px solid rgba(200,146,42,.07);}
.pos-num{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:.04em;line-height:1;color:var(--cream);}
.chart-row.top3 .pos-num{color:var(--gold);}
.pos-weeks{font-family:'Barlow Condensed',sans-serif;font-size:.5rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-top:2px;}
.row-mov{display:flex;align-items:center;justify-content:center;padding:0 .5rem;}
.mov-badge{font-family:'Bebas Neue',sans-serif;font-size:.75rem;letter-spacing:.08em;padding:.2rem .4rem;min-width:36px;text-align:center;}
.mov-NEW{color:var(--new);border:1px solid rgba(74,158,255,.3);background:rgba(74,158,255,.08);}
.mov-UP{color:var(--up);border:1px solid rgba(74,239,138,.3);background:rgba(74,239,138,.06);}
.mov-DOWN{color:var(--down);border:1px solid rgba(239,74,74,.3);background:rgba(239,74,74,.06);}
.mov-HOLD{color:var(--hold);border:1px solid rgba(136,136,136,.2);background:rgba(136,136,136,.04);}
.row-info{display:grid;grid-template-columns:52px 1fr;gap:1rem;align-items:center;padding:1rem;}
.row-cover{width:52px;height:52px;object-fit:cover;border:1px solid var(--border);background:var(--dark3);}
.row-title{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;letter-spacing:.06em;color:var(--cream);line-height:1;margin-bottom:.2rem;transition:color .2s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.row-artist{font-family:'Barlow Condensed',sans-serif;font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;color:var(--rust);margin-bottom:.15rem;}
.row-album{font-size:.72rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.row-play{padding:0 1.5rem;}
.play-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--tan);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:border-color .2s,color .2s,background .2s;font-size:.7rem;flex-shrink:0;}
.play-btn:hover{border-color:var(--gold);color:var(--gold-lt);background:rgba(200,146,42,.08);}
.play-btn.playing{border-color:var(--rust);color:var(--rust);background:rgba(180,74,28,.1);}
.chart-row.top3{background:rgba(200,146,42,.025);}

/* Mini player */
#mini-player{position:fixed;bottom:0;left:0;right:0;z-index:200;background:rgba(10,9,8,0.94);border-top:1px solid var(--border);backdrop-filter:blur(16px);padding:.75rem 1.5rem;display:none;align-items:center;gap:1rem;}
#mini-player.visible{display:flex;}
#mini-art{width:44px;height:44px;object-fit:cover;border:1px solid var(--border);flex-shrink:0;}
.mini-info{flex:1;min-width:0;}
.mini-title{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:.06em;color:var(--cream);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.mini-sub{font-family:'Barlow Condensed',sans-serif;font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:var(--rust);}
.mini-progress{flex:1;height:3px;background:rgba(200,146,42,.12);cursor:pointer;max-width:200px;}
.mini-fill{height:100%;width:0%;background:linear-gradient(to right,var(--rust),var(--gold));transition:width .5s linear;}
.mini-controls{display:flex;align-items:center;gap:.5rem;}
.mini-btn{font-family:'Barlow Condensed',sans-serif;font-size:.62rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;border:1px solid var(--border);background:transparent;color:var(--tan);padding:.35rem .75rem;cursor:pointer;transition:all .2s;white-space:nowrap;}
.mini-btn:hover{border-color:var(--gold);color:var(--gold-lt);}
.mini-btn.next-btn{background:var(--rust);border-color:var(--rust);color:var(--cream);}
.mini-btn.next-btn:hover{background:#d05520;}
.mini-btn.stop-btn{color:var(--muted);}

footer{text-align:center;padding:2rem;border-top:1px solid var(--border);font-family:'Barlow Condensed',sans-serif;font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);}
footer a{color:var(--muted);text-decoration:none;}
footer a:hover{color:var(--gold-lt);}
.loading{text-align:center;padding:4rem;font-family:'Barlow Condensed',sans-serif;font-size:.7rem;letter-spacing:.25em;text-transform:uppercase;color:var(--muted);}
@media(max-width:600px){
  .chart-row{grid-template-columns:52px 44px 1fr auto;}
  .row-info{grid-template-columns:44px 1fr;gap:.75rem;padding:.75rem;}
  .row-cover{width:44px;height:44px;}
  .row-play{padding:0 .75rem;}
  .pos-num{font-size:1.4rem;}
}
</style>
</head>
<body>

<header>
  <a href="https://hellotexasrecords.com" class="header-back">← HTR Home</a>
  <div class="header-title">HTR Top 20</div>
  <div class="header-date" id="header-date"></div>
</header>

<div class="hero">
  <div class="hero-eyebrow">Hello Texas Records</div>
  <h1 class="hero-title">HTR <span>Top</span> 20</h1>
  <div class="gold-rule"></div>
  <div class="hero-sub">This Week's Chart</div>
</div>

<div class="chart-wrap" id="chart-wrap">
  <div class="loading">Loading chart...</div>
</div>

<footer>
  <a href="https://hellotexasrecords.com">Hello Texas Records</a>
  &nbsp;·&nbsp; Independent Texas Music
</footer>

<div id="mini-player">
  <img id="mini-art" src="" alt="">
  <div class="mini-info">
    <div class="mini-title" id="mini-title">—</div>
    <div class="mini-sub" id="mini-sub">HTR Top 20</div>
  </div>
  <div class="mini-progress" id="mini-progress">
    <div class="mini-fill" id="mini-fill"></div>
  </div>
  <div class="mini-controls">
    <button class="mini-btn" id="mini-play-btn" onclick="togglePlay()">Pause</button>
    <button class="mini-btn next-btn" id="mini-next-btn" onclick="playNext()" style="display:none">Next ▶</button>
    <button class="mini-btn stop-btn" onclick="stopAudio()">✕</button>
  </div>
</div>

<audio id="chart-audio"></audio>

<script>
const audio      = document.getElementById('chart-audio');
const miniPlayer = document.getElementById('mini-player');
const nextBtn    = document.getElementById('mini-next-btn');
let _chart       = [];
let currentIndex = null;
let playingIntro = false;
let currentBtn   = null;

const MOV_LABEL = {NEW:'★ NEW',UP:'▲ UP',DOWN:'▼ DN',HOLD:'— HLD'};
const MOV_CLASS = {NEW:'mov-NEW',UP:'mov-UP',DOWN:'mov-DOWN',HOLD:'mov-HOLD'};

function formatDate(str) {
  if (!str) return '';
  const d = new Date(str + 'T00:00:00');
  return d.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
}

fetch('chart.json?cb=' + Date.now())
  .then(r => r.json())
  .then(chart => {
    _chart = chart;
    const wrap = document.getElementById('chart-wrap');
    if (!chart || !chart.length) { wrap.innerHTML='<div class="loading">No chart data yet.</div>'; return; }
    document.getElementById('header-date').innerHTML = 'Week of<br>' + formatDate(chart[0]?.chartDate||'');
    const displayOrder = [...chart].reverse();
    wrap.innerHTML = displayOrder.map((e) => {
      const i = chart.indexOf(e);
      const mc = MOV_CLASS[e.movement]||'mov-HOLD';
      const ml = MOV_LABEL[e.movement]||'— HLD';
      const top = i<3?'top3':'';
      const wk  = e.weeksOnChart===1?'1 week':`${e.weeksOnChart} wks`;
      const has = e.audioFile||e.introAudio;
      return `<a class="chart-row ${top}" href="${e.siteUrl||'#'}" target="_blank" onclick="rowClick(event,${i})">
        <div class="row-pos"><div class="pos-num">${e.position}</div><div class="pos-weeks">${wk}</div></div>
        <div class="row-mov"><div class="mov-badge ${mc}">${ml}</div></div>
        <div class="row-info">
          <img class="row-cover" src="${e.coverImage||''}" onerror="this.src='https://raw.githubusercontent.com/SteveP999/hello-texas-records/main/htr-logo.png'" alt="">
          <div class="row-text">
            <div class="row-title">${e.title}</div>
            <div class="row-artist">${e.artist}</div>
            <div class="row-album">${e.album||''}</div>
          </div>
        </div>
        <div class="row-play">${has
          ?`<button class="play-btn" id="play-${i}" onclick="startAt(event,${i})">▶</button>`
          :`<div class="play-btn" style="opacity:.2;cursor:default">▶</div>`
        }</div>
      </a>`;
    }).join('');
  })
  .catch(() => { document.getElementById('chart-wrap').innerHTML='<div class="loading">Could not load chart.</div>'; });

function rowClick(e,i) { if (e.target.closest('.play-btn')) e.preventDefault(); }

function startAt(e,i) {
  e.preventDefault(); e.stopPropagation();
  playIndex(i);
}

function playIndex(i) {
  const entry = _chart[i];
  if (!entry) return;

  // Reset old button
  if (currentBtn) { currentBtn.textContent='▶'; currentBtn.classList.remove('playing'); }

  currentIndex = i;
  currentBtn   = document.getElementById('play-'+i);
  if (currentBtn) { currentBtn.textContent='❚❚'; currentBtn.classList.add('playing'); }

  // Mini player info
  document.getElementById('mini-title').textContent = entry.title;
  document.getElementById('mini-sub').textContent   = entry.artist;
  document.getElementById('mini-art').src = entry.coverImage ||
    'https://raw.githubusercontent.com/SteveP999/hello-texas-records/main/htr-logo.png';
  miniPlayer.classList.add('visible');
  nextBtn.style.display = 'none'; // hide Next until song finishes

  // Play intro then song, or just song
  if (entry.introAudio) {
    playingIntro = true;
    document.getElementById('mini-sub').textContent = 'Countdown Casey...';
    audio.src = entry.introAudio;
    audio.play().catch(() => playSong(entry));
  } else {
    playSong(entry);
  }
}

function playSong(entry) {
  playingIntro = false;
  document.getElementById('mini-sub').textContent = entry.artist;
  document.getElementById('mini-play-btn').textContent = 'Pause';
  if (entry.audioFile) {
    audio.src = entry.audioFile;
    audio.play().catch(()=>{});
  }
}

audio.addEventListener('ended', () => {
  if (playingIntro && currentIndex !== null) {
    playSong(_chart[currentIndex]);
  } else {
    // Song done — show Next button if not at #1
    document.getElementById('mini-play-btn').textContent = 'Play';
    if (currentBtn) currentBtn.textContent = '▶';
    if (currentIndex !== null && currentIndex > 0) {
      nextBtn.textContent = "Next Song ▶";
      nextBtn.style.display = 'inline-block';
    }
  }
});

function playNext() {
  if (currentIndex === null || currentIndex === 0) return;
  playIndex(currentIndex - 1);
}

function togglePlay() {
  if (audio.paused) {
    audio.play();
    if (currentBtn) { currentBtn.textContent='❚❚'; currentBtn.classList.add('playing'); }
    document.getElementById('mini-play-btn').textContent = 'Pause';
  } else {
    audio.pause();
    if (currentBtn) { currentBtn.textContent='▶'; currentBtn.classList.remove('playing'); }
    document.getElementById('mini-play-btn').textContent = 'Play';
  }
}

function stopAudio() {
  audio.pause(); audio.src=''; playingIntro=false;
  if (currentBtn) { currentBtn.textContent='▶'; currentBtn.classList.remove('playing'); currentBtn=null; }
  currentIndex=null; nextBtn.style.display='none';
  miniPlayer.classList.remove('visible');
}

audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  document.getElementById('mini-fill').style.width = (audio.currentTime/audio.duration*100)+'%';
});

document.getElementById('mini-progress').addEventListener('click', e => {
  if (!audio.duration) return;
  const r = e.currentTarget.getBoundingClientRect();
  audio.currentTime = ((e.clientX-r.left)/r.width)*audio.duration;
});
</script>
</body>
</html>
